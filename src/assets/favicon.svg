<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- bars -->
  <rect x="4"  y="36" width="10" height="20" rx="1" fill="#1e293b"/>
  <rect x="18" y="42" width="10" height="14" rx="1" fill="#1e293b"/>
  <rect x="32" y="28" width="10" height="28" rx="1" fill="#1e293b"/>
  <rect x="46" y="34" width="10" height="22" rx="1" fill="#1e293b"/>
  <!-- baseline -->
  <line x1="2" y1="57" x2="62" y2="57" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- trend line -->
  <polyline
    points="9,34  23,40  37,26  51,20"
    fill="none"
    stroke="#1e293b"
    stroke-width="2.5"
    stroke-dasharray="4 3"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <!-- dots -->
  <circle cx="9"  cy="34" r="4" fill="#1e293b"/>
  <circle cx="23" cy="40" r="4" fill="#1e293b"/>
  <circle cx="37" cy="26" r="4" fill="#1e293b"/>
  <circle cx="51" cy="20" r="4" fill="#1e293b"/>
</svg>
