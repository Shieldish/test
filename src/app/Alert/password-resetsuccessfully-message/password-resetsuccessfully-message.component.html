<div class="alert-page">
  <div class="alert-card success">
    <div class="alert-card-icon">
      <mat-icon>check_circle_outline</mat-icon>
    </div>
    <h2 class="alert-card-title">Mot de passe modifié</h2>
    <p class="alert-card-msg">Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</p>
    <div class="alert-card-actions">
      <button class="btn btn-primary" (click)="login()">
        <mat-icon style="font-size:18px;width:18px;height:18px;">login</mat-icon>
        Se connecter
      </button>
    </div>
  </div>
</div>
