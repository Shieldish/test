<div class="alert-page">
  <div class="alert-card success">
    <div class="alert-card-icon">
      <mat-icon>mark_email_read</mat-icon>
    </div>
    <h2 class="alert-card-title">Compte créé avec succès</h2>
    <p class="alert-card-msg">
      Un e-mail de vérification a été envoyé à
      <span class="alert-email">{{ getUserEmail() }}</span>.
      Veuillez cliquer sur le lien dans cet e-mail pour activer votre compte.
    </p>
    <div class="alert-card-hint">
      <mat-icon style="font-size:16px;width:16px;height:16px;">inbox</mat-icon>
      Pensez à vérifier votre dossier spam si vous ne recevez pas l'e-mail.
    </div>
  </div>
</div>
