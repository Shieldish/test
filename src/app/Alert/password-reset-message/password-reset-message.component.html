<div class="alert-page">
  <div class="alert-card info">
    <div class="alert-card-icon">
      <mat-icon>mail_outline</mat-icon>
    </div>
    <h2 class="alert-card-title">E-mail envoyé</h2>
    <p class="alert-card-msg">
      Un lien de réinitialisation du mot de passe a été envoyé à
      <span class="alert-email">{{ getUserEmail() }}</span>.
    </p>
    <div class="alert-card-hint">
      <mat-icon style="font-size:16px;width:16px;height:16px;">schedule</mat-icon>
      Le lien expire dans 24 heures. Vérifiez aussi votre dossier spam.
    </div>
  </div>
</div>
