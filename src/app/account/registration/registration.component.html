<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">
        <mat-icon>person_add_alt_1</mat-icon>
      </div>
      <div class="auth-title">Créer un compte</div>
      <p class="auth-subtitle">Rejoignez la plateforme d'analyse de contenu multilingue</p>
    </div>

    <form class="auth-form" [formGroup]="angForm" (ngSubmit)="postdata(angForm)" autocomplete="on">

      <div class="error-msg" *ngIf="Message()">
        <mat-icon style="font-size:16px;width:16px;height:16px;">error_outline</mat-icon>
        {{ Message() }}
      </div>

      <div>
        <label class="field-label" for="name">Nom d'utilisateur</label>
        <input
          id="name"
          type="text"
          name="name"
          formControlName="name"
          autocomplete="name"
          class="field-input"
          placeholder="Votre nom complet">
      </div>

      <div>
        <label class="field-label" for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          name="email"
          formControlName="email"
          autocomplete="email"
          class="field-input"
          placeholder="exemple@domaine.com">
      </div>

      <div>
        <label class="field-label" for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          name="Password"
          formControlName="password"
          autocomplete="new-password"
          class="field-input"
          placeholder="8 caractères minimum">
        <p class="field-hint text-danger"
           [hidden]="angForm.value.password == ''"
           *ngIf="angForm.value.password.length < 8">
          Le mot de passe doit contenir au minimum 8 caractères.
        </p>
      </div>

      <button
        type="submit"
        class="submit-btn"
        [disabled]="!angForm.valid || angForm.value.password.toString().length < 8">
        <mat-icon style="font-size:18px;width:18px;height:18px;">how_to_reg</mat-icon>
        Créer mon compte
      </button>

      <div class="auth-footer">
        <span style="font-size:var(--text-sm);color:var(--color-gray-500)">Vous avez déjà un compte ?</span>
        <button type="button" class="link-btn" (click)="redirectToLogin()">Se connecter</button>
      </div>

    </form>
  </div>
</div>
