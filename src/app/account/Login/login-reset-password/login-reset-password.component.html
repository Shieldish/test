<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">
        <mat-icon>lock_reset</mat-icon>
      </div>
      <div class="auth-title">Nouveau mot de passe</div>
      <p class="auth-subtitle">Choisissez un mot de passe d'au moins 8 caractères</p>
    </div>

    <form class="auth-form" [formGroup]="angForm" (ngSubmit)="postdata(angForm)" autocomplete="off">

      <div class="error-msg" *ngIf="Message()">
        <mat-icon style="font-size:16px;width:16px;height:16px;">error_outline</mat-icon>
        {{ Message() }}
      </div>

      <div>
        <label class="field-label" for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          name="email"
          formControlName="email"
          autocomplete="email"
          class="field-input"
          placeholder="Votre adresse e-mail">
      </div>

      <div>
        <label class="field-label" for="password">Nouveau mot de passe</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password1"
          name="Password"
          formControlName="password"
          autocomplete="new-password"
          class="field-input"
          placeholder="8 caractères minimum">
        <p class="field-hint text-danger"
           [hidden]="angForm.value.password == '' && angForm.value.cpassword == ''"
           *ngIf="angForm.value.password.toString().length < 8">
          Le mot de passe doit contenir au minimum 8 caractères.
        </p>
      </div>

      <div>
        <label class="field-label" for="cpassword">Confirmer le mot de passe</label>
        <input
          id="cpassword"
          type="password"
          [(ngModel)]="password2"
          name="password"
          formControlName="cpassword"
          autocomplete="new-password"
          class="field-input"
          placeholder="Confirmez votre mot de passe">
        <p class="field-hint text-success"
           *ngIf="(angForm.value.password.length > 0 && angForm.value.cpassword.length > 0) && (angForm.value.password === angForm.value.cpassword)">
          Les mots de passe sont identiques.
        </p>
        <p class="field-hint text-danger"
           *ngIf="angForm.value.cpassword != angForm.value.password && angForm.value.cpassword.length > 0">
          Les mots de passe ne sont pas identiques.
        </p>
      </div>

      <button
        type="submit"
        class="submit-btn"
        [disabled]="!angForm.valid || angForm.value.password != angForm.value.cpassword || angForm.value.password.toString().length < 8">
        <mat-icon style="font-size:18px;width:18px;height:18px;">check_circle</mat-icon>
        Enregistrer le mot de passe
      </button>

    </form>
  </div>
</div>
