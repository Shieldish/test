<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">
        <mat-icon>mail_outline</mat-icon>
      </div>
      <div class="auth-title">Mot de passe oublié</div>
      <p class="auth-subtitle">Entrez votre adresse e-mail pour recevoir un lien de réinitialisation</p>
    </div>

    <form class="auth-form" [formGroup]="angForm" (ngSubmit)="postdata(angForm)" autocomplete="off">

      <div class="error-msg" *ngIf="Message()">
        <mat-icon style="font-size:16px;width:16px;height:16px;">error_outline</mat-icon>
        {{ Message() }}
      </div>

      <div>
        <label class="field-label" for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          name="email"
          formControlName="email"
          autocomplete="email"
          class="field-input"
          placeholder="exemple@domaine.com">
      </div>

      <button type="submit" class="submit-btn" [disabled]="!angForm.valid">
        <mat-icon style="font-size:18px;width:18px;height:18px;">send</mat-icon>
        Envoyer le lien
      </button>

    </form>
  </div>
</div>
