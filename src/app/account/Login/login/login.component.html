<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">
        <mat-icon>lock_outline</mat-icon>
      </div>
      <div class="auth-title">Connexion</div>
      <p class="auth-subtitle">Accédez à votre espace d'analyse multilingue</p>
    </div>

    <form class="auth-form" [formGroup]="angForm" (ngSubmit)="postdata(angForm)" autocomplete="off">

      <div class="error-msg" *ngIf="Message()">
        <mat-icon style="font-size:16px;width:16px;height:16px;">error_outline</mat-icon>
        {{ Message() }}
      </div>

      <div>
        <label class="field-label" for="email">Adresse e-mail</label>
        <input
          id="email"
          type="email"
          name="email"
          formControlName="email"
          autocomplete="email"
          class="field-input"
          placeholder="exemple@domaine.com">
      </div>

      <div>
        <label class="field-label" for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          name="Password"
          formControlName="password"
          autocomplete="current-password"
          class="field-input"
          placeholder="Votre mot de passe">
      </div>

      <button type="submit" class="submit-btn">
        <mat-icon style="font-size:18px;width:18px;height:18px;">login</mat-icon>
        Se connecter
      </button>

      <div class="auth-footer">
        <button type="button" class="link-btn danger" (click)="forgetPassword()">Mot de passe oublié ?</button>
        <span class="divider-text">·</span>
        <button type="button" class="link-btn" (click)="redirectToRegister()">Créer un compte</button>
      </div>

    </form>
  </div>
</div>
